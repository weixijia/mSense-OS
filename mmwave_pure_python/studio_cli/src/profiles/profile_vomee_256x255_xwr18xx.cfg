% ***************************************************************
% Vomee 256x255 raw-ADC profile for mmWave Studio CLI Tool (AWR1843 + DCA1000)
% RF params copied 1:1 from F:\mmwave_cam2.11\lua\skeleton.lua so the raw data
% is IDENTICAL to the current Studio capture.
%   ProfileConfig(0,77,20,6,60, ...,65.998, 0, 256, 4800, ...,30)
%   TX0+TX2 (mask 5), RX0-3 (mask 15), 256 samples, 255 loops, 100 ms frame.
% This firmware (mmwave_Studio_cli_xwr18xx.bin) does NO on-chip detection, so
% numLoops=255 is fine (no 32KB detection-matrix cap). lvdsStreamCfg = header-less ADC.
% numFrames=10 here = a short validation capture (auto-stops). Set to 0 for continuous.
% ***************************************************************
dfeDataOutputMode 1
channelCfg 15 5 0
adcCfg 2 1
adcbufCfg -1 0 1 1 1
profileCfg 0 77 20 6 60 0 0 65.998 0 256 4800 0 0 30
chirpCfg 0 0 0 0 0 0 0 1
chirpCfg 1 1 0 0 0 0 0 4
frameCfg 0 1 255 10 100 1 0
lowPower 0 0
lvdsStreamCfg -1 0 1 0
sensorStart
